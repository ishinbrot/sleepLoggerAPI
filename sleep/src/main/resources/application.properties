spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=user
spring.datasource.password=password
spring.flyway.baselineOnMigrate=true
spring.flyway.enabled=true


# ==========================================
# LOGGING CONFIGURATION
# ==========================================

# Define root logging level (INFO keeps console clean from framework noise)
logging.level.root=INFO

# Set your application code to DEBUG or TRACE so you see all your custom log statements
logging.level.com.noom.interview.fullstack.sleep=DEBUG

# Optional: Capture Hibernate SQL statements and bound variables for database debugging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Format the console output to include: Date, Time, Log Level, Thread, and Class name
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n